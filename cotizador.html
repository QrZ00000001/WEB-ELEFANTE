<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Impresión | Elefante Difusión</title>
    <meta name="description" content="Calculadora profesional de optimización de espacio para impresión.">
    <link rel="stylesheet" href="cotizador.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
</head>
<body>

    <div class="app-two-columns">
        <h1 style="text-align: center; margin-top: 20px; margin-bottom: 10px; font-size: 2.2rem; font-weight: 800; color: #ffffff;">Cotizador de Adhesivos</h1>
        <!-- COLUMNA 1: CANTIDADES Y GEOMETRÍA -->
        <main class="column config-column">
            <div class="glass-panel full-height">
                <div class="column-header" style="justify-content: center;">
                    <h2 style="font-size: 1.5rem; font-weight: 700;">Cantidades</h2>
                </div>

                <section class="input-grid-single">
                    <div class="input-group">
                        <label for="width">Ancho del diseño (cm)</label>
                        <input type="text" inputmode="decimal" id="width" placeholder="0.0">
                    </div>
                    <div class="input-group">
                        <label for="height">Alto del diseño (cm)</label>
                        <input type="text" inputmode="decimal" id="height" placeholder="0.0">
                    </div>

                    <div class="divider"></div>

                    <div class="input-group">
                        <label>Tipo de Entrega</label>
                        <div class="segmented-control">
                            <input type="radio" name="mode" id="unitario" value="unitario" checked>
                            <label for="unitario">Unitario</label>
                            
                            <input type="radio" name="mode" id="rollo" value="rollo">
                            <label for="rollo">En Rollo</label>
                            
                            <div class="selection-slider"></div>
                        </div>
                        <span style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.3;">* A los adhesivos unitarios se les agrega 5mm de margen por lado para su corte.</span>
                    </div>

                    <div class="input-group">
                        <label for="material-type">Tipo de Material</label>
                        <select id="material-type">
                            <option value="blanco">Blanco</option>
                            <option value="tornasol">Tornasol</option>
                            <option value="fotoluminiscente">Fotoluminiscente</option>
                            <option value="transparente">Transparente</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="finish-type">Tipo de Terminación</label>
                        <select id="finish-type">
                            <option value="nada">Ninguna (Solo impresión)</option>
                            <option value="barniz">Barniz</option>
                            <option value="blanco">Tinta Blanca</option>
                            <option value="blanco_barniz">Blanco + Barniz</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>¿Qué deseas calcular?</label>
                        <div class="segmented-control">
                            <input type="radio" name="calcMode" id="calcQty" value="qty" checked>
                            <label for="calcQty">Por Cantidad</label>
                            
                            <input type="radio" name="calcMode" id="calcM2" value="m2">
                            <label for="calcM2">Por Metros (m²)</label>
                            
                            <div class="selection-slider"></div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label id="target-label" for="target-input">Cantidad de Adhesivos</label>
                        <input type="text" inputmode="decimal" id="target-input" placeholder="Ej: 500">
                    </div>

                    <div class="results-summary" id="results-grid" style="grid-template-columns: 1fr;">
                        <div class="res-card blue" id="card-resultado-principal">
                            <span class="res-label" id="res-label-2">m² Necesarios</span>
                            <span id="res-val-2" class="res-value">0</span>
                        </div>
                    </div>

                    <div class="results-summary" style="grid-template-columns: 1fr; margin-top: 15px;">
                        <div class="res-card" style="border-color: #30d158; background: rgba(48, 209, 88, 0.08);">
                            <span class="res-label">Valor Estimado</span>
                            <span id="total-price" class="res-value" style="color: #30d158;">$0</span>
                        </div>
                    </div>

                    <div class="details">
                        <p id="calc-details">Ingresa medidas para calcular</p>
                    </div>

                    <div style="margin-top: 20px; text-align: center; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.8;">
                        * Nota: El mínimo de pedido son 0.5 m².
                    </div>
                </section>
            </div>
        </main>

    </div>

    <footer class="main-footer">
        <p>&copy; <span id="year">2026</span> Elefante Difusión. Diseño Premium.</p>
    </footer>

    <script src="cotizador.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error', err)); });
      }
    </script>
</body>
</html>
